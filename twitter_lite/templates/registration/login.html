{% extends 'base.html' %}



{% block content %}

<h1>Login Page</h1>
<form method="POST" class="form">
    {% csrf_token %}
    {{form.as_p}}

    <button type="submit" class="btn btn-primary">Login</button>
  
</form>
<p>Don't have an account? <a href="{%url 'register' %}">Register here</a></p>
<p><a href="{%url 'password_reset' %}">Forgot Password?</a></p>
{% endblock content %}
